[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "apps/backend/**",
  "packages/shared/**",
  "Dockerfile",
  ".dockerignore",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
  "railway.toml"
]

[deploy]
startCommand = "corepack pnpm --filter @metamystic/backend prisma:deploy && corepack pnpm --filter @metamystic/backend start"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
