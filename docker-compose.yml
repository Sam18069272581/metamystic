services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: metamystic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: metamystic
    ports:
      - "5432:5432"
    volumes:
      - metamystic_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d metamystic"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  metamystic_postgres:
